name: Build Android APK

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # خطوة ذكية: البحث عن ملف gradlew وإعطاؤه صلاحية التنفيذ أينما كان
      - name: Grant execute permission for gradlew
        run: find . -name "gradlew" -exec chmod +x {} +

      # تشغيل البناء من المجلد الذي يحتوي على ملف gradle
      - name: Build with Gradle
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew not found in the repository!"
            exit 1
          fi
          cd $(dirname "$GRADLEW_PATH")
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/outputs/apk/release/*.apk"
